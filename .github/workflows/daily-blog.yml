name: Daily Blog Post

on:
  schedule:
    # 10:05 AM America/Chicago = 15:05 UTC (CDT, UTC-5) or 16:05 UTC (CST, UTC-6)
    # Using 15:05 UTC keeps the run once daily while avoiding busier half-hour slots.
    - cron: '5 15 * * *'  # Daily at 10:05 AM Chicago time (CDT)
  workflow_dispatch:  # Allow manual triggering from GitHub UI
    inputs:
      lane:
        description: 'Editorial lane (daily_seo, weekly_authority, monthly_anonymized_case, listicle)'
        required: false
        default: 'daily_seo'
      curated_bucket:
        description: 'Curated bucket name (optional). If empty, pipeline runs signal-driven — scrapes 19 competitor sitemaps, scores clusters, picks highest in a non-cooldown category.'
        required: false
      originate_seed_b64:
        description: 'Base64-encoded operator-voice seed (originate path only). 3-5 sentences of first-hand observation.'
        required: false
      originate_category:
        description: 'Category id for the originate post (e.g. reputation, lead_reactivation) — required when originate_seed_b64 is set.'
        required: false
      max_attempts:
        description: 'Signal candidates to try before giving up (1-5; ignored for curated/originate)'
        required: false
        default: '5'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Two signal attempts can take 30-45 min when gates retry

    steps:
      - name: Checkout ultraplan_cc
        uses: actions/checkout@v4

      - name: Checkout site repo (for dedup)
        uses: actions/checkout@v4
        with:
          repository: visquanta-dev/site
          path: site-checkout
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        id: pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AHREFS_API_TOKEN: ${{ secrets.AHREFS_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          ULTRAPLAN_DISCOVERY_SIGNALS: ${{ vars.ULTRAPLAN_DISCOVERY_SIGNALS || '0' }}
          MAX_PIPELINE_ATTEMPTS: ${{ github.event.inputs.max_attempts || '5' }}
          ORIGINATE_SEED_B64: ${{ github.event.inputs.originate_seed_b64 }}
          ORIGINATE_CATEGORY: ${{ github.event.inputs.originate_category }}
        run: |
          set -o pipefail
          LANE="${{ github.event.inputs.lane || 'daily_seo' }}"
          BUCKET="${{ github.event.inputs.curated_bucket }}"

          if [ -n "$ORIGINATE_SEED_B64" ]; then
            mkdir -p tmp
            # -i tolerates whitespace/newlines injected by GH Actions input rendering
            printf '%s' "$ORIGINATE_SEED_B64" | tr -d '[:space:]' | base64 -d > tmp/originate-seed.txt
            export ORIGINATE_SEED_FILE="tmp/originate-seed.txt"
            echo "Originate mode: seed=$(wc -c < tmp/originate-seed.txt) chars, category=$ORIGINATE_CATEGORY"
          fi

          ARGS="$LANE"
          if [ -n "$BUCKET" ] && [ -z "$ORIGINATE_SEED_B64" ]; then
            ARGS="$ARGS $BUCKET"
          fi

          echo "Running: npx tsx scripts/run-pipeline-local.ts $ARGS"
          npx tsx scripts/run-pipeline-local.ts $ARGS 2>&1 | tee pipeline.log

          # Pipeline writes result to pipeline-result.json
          if [ -f pipeline-result.json ]; then
            cat pipeline-result.json
            echo "result=$(cat pipeline-result.json)" >> $GITHUB_OUTPUT
          else
            echo 'result={"slug":"unknown","verdict":"error","error":"No result file produced"}' >> $GITHUB_OUTPUT
          fi

      - name: Notify via webhook
        if: always()
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_BLOG_WEBHOOK_URL }}
        run: |
          if [ ! -f pipeline-result.json ]; then
            printf '%s' '{"slug":"unknown","verdict":"error","error":"Pipeline failed before producing output"}' > pipeline-result.json
          fi
          echo "Sending to webhook:"
          cat pipeline-result.json
          echo
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data-binary @pipeline-result.json || echo "Webhook notification failed (non-fatal)"

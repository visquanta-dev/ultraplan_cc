name: Daily Blog Post

on:
  schedule:
    # 9:30 AM America/Chicago = 14:30 UTC (CDT, UTC-5) or 15:30 UTC (CST, UTC-6)
    # Using 14:30 UTC for CDT (summer). Adjust to 15:30 for CST (winter).
    - cron: '30 14 * * 1-5'  # Mon-Fri at 9:30 AM Chicago time (CDT)
  workflow_dispatch:  # Allow manual triggering from GitHub UI
    inputs:
      lane:
        description: 'Editorial lane (daily_seo, weekly_authority, monthly_anonymized_case, listicle)'
        required: false
        default: 'daily_seo'
      strategy:
        description: 'Topic strategy (calendar_first, feed_first, curated_first)'
        required: false
        default: 'calendar_first'
      curated_bucket:
        description: 'Curated bucket name (optional, only for curated_first)'
        required: false
      originate_seed_b64:
        description: 'Base64-encoded operator-voice seed (originate path only). 3-5 sentences of first-hand observation.'
        required: false
      originate_category:
        description: 'Category id for the originate post (e.g. reputation, lead_reactivation) — required when originate_seed_b64 is set.'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Pipeline takes ~15 min, give it headroom

    steps:
      - name: Checkout ultraplan_cc
        uses: actions/checkout@v4

      - name: Checkout site repo (for dedup)
        uses: actions/checkout@v4
        with:
          repository: visquanta-dev/site
          path: site-checkout
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        id: pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AHREFS_API_TOKEN: ${{ secrets.AHREFS_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        env:
          ORIGINATE_SEED_B64: ${{ github.event.inputs.originate_seed_b64 }}
          ORIGINATE_CATEGORY: ${{ github.event.inputs.originate_category }}
        run: |
          LANE="${{ github.event.inputs.lane || 'daily_seo' }}"
          STRATEGY="${{ github.event.inputs.strategy || 'calendar_first' }}"
          BUCKET="${{ github.event.inputs.curated_bucket }}"

          # Originate mode: decode the base64-encoded seed to a file and set
          # ORIGINATE_SEED_FILE + ORIGINATE_CATEGORY for the pipeline runner.
          # Base64 is used to cleanly carry multi-line text through the
          # workflow_dispatch input layer without escaping headaches.
          if [ -n "$ORIGINATE_SEED_B64" ]; then
            mkdir -p tmp
            echo "$ORIGINATE_SEED_B64" | base64 -d > tmp/originate-seed.txt
            export ORIGINATE_SEED_FILE="tmp/originate-seed.txt"
            echo "Originate mode: seed=$(wc -c < tmp/originate-seed.txt) chars, category=$ORIGINATE_CATEGORY"
          fi

          ARGS="$LANE"
          if [ -n "$BUCKET" ] && [ -z "$ORIGINATE_SEED_B64" ]; then
            ARGS="$ARGS $BUCKET"
          elif [ "$STRATEGY" != "feed_first" ] && [ -z "$ORIGINATE_SEED_B64" ]; then
            ARGS="$ARGS --strategy $STRATEGY"
          fi

          echo "Running: npx tsx scripts/run-pipeline-local.ts $ARGS"
          npx tsx scripts/run-pipeline-local.ts $ARGS 2>&1 | tee pipeline.log || true

          # Pipeline writes result to pipeline-result.json
          if [ -f pipeline-result.json ]; then
            cat pipeline-result.json
            echo "result=$(cat pipeline-result.json)" >> $GITHUB_OUTPUT
          else
            echo 'result={"slug":"unknown","verdict":"error","error":"No result file produced"}' >> $GITHUB_OUTPUT
          fi

      - name: Notify via webhook
        if: always()
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_BLOG_WEBHOOK_URL }}
        run: |
          # Read result from file if available, fall back to GitHub output
          if [ -f pipeline-result.json ]; then
            RESULT=$(cat pipeline-result.json)
          else
            RESULT='${{ steps.pipeline.outputs.result }}'
          fi

          # If still no result, create error payload
          if [ -z "$RESULT" ] || [ "$RESULT" = "" ]; then
            RESULT='{"slug":"unknown","verdict":"error","error":"Pipeline failed before producing output"}'
          fi

          echo "Sending to webhook: $RESULT"
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$RESULT" || echo "Webhook notification failed (non-fatal)"

# ============================================================================
# UltraPlan — image style: daily_seo lane
# Flux 2 Pro photorealistic editorial style. Every daily SEO post hero reads
# as part of the same professional publication.
# ============================================================================

lane: daily_seo
model: black-forest-labs/flux-2-pro

# ----------------------------------------------------------------------------
# Aspect ratio + dimensions (hero only)
# ----------------------------------------------------------------------------
dimensions:
  hero:
    width: 1600
    height: 900
    aspect_ratio: "16:9"

# ----------------------------------------------------------------------------
# Style prompt — prepended verbatim to every prompt for this lane
# ----------------------------------------------------------------------------
style_prompt: |
  Professional editorial photograph for a business technology blog.
  Clean composition, studio lighting, shallow depth of field.
  Modern, minimal environments — think: Harvard Business Review, Fast Company,
  Wired editorial photography. Warm, inviting tones. Subject should be
  abstract or environmental — empty modern spaces, abstract technology
  patterns, geometric light compositions, clean surfaces with subtle tech
  elements, close-up textures of premium materials, bokeh light patterns.
  NEVER show a dealership interior, showroom, service bay, or cars.
  NEVER show identifiable human faces or people.
  NEVER include brand logos, car badges, text, or signage.
  Strong compositional balance with clear focal point and negative space.

# ----------------------------------------------------------------------------
# Negative prompt — hard rejections
# ----------------------------------------------------------------------------
negative_prompt: |
  identifiable human faces, brand logos, car badges, OEM logos, NHTSA logo,
  text overlay, text artifacts, cluttered composition, stock photo aesthetic,
  corporate clip art, cartoon, anime, 3D render, gradient backgrounds,
  watermarks, low resolution

# ----------------------------------------------------------------------------
# Brand-fit vision check rubric (stage 6b gate)
# ----------------------------------------------------------------------------
# Vision model scores each generated image 1-10 against this rubric.
# Minimum passing score: 7.
brand_fit_rubric:
  - "Professional editorial photography quality — not stock photo aesthetic"
  - "Clean composition with clear focal point and strong balance"
  - "No identifiable human faces, no brand logos, no text in the image"
  - "Warm, modern tones appropriate for a business technology publication"
  - "Subject matter is relevant or abstractly evocative of the article topic"

# ----------------------------------------------------------------------------
# Anonymization — extra check for client-identifying content
# ----------------------------------------------------------------------------
anonymization_rule: |
  No specific dealership names, no identifiable car brand logos or badges,
  no OEM branding visible anywhere in the image.

  # Re-add when we support HTML-index scraping.

# ---------------------------------------------------------------------------
# CATEGORIES — 7 product-aligned editorial lanes
#
# A post belongs to exactly one category. The category determines:
#   - Whether it's currently in cooldown (no same-category post in last
#     cooldown_days)
#   - Which CTA gets injected mid-article
#   - Which sources from `sources` above are most relevant for topic mirror
#   - Its editorial_weight (tiebreaker when multiple categories unblocked)
#
# Cooldown semantics:
#   - Window checked against merged posts on site main (content/blog/*.md)
#   - Today was 2026-04-18; if a reputation post shipped today, the next
#     reputation cluster is blocked until 2026-04-23.
# ---------------------------------------------------------------------------

categories:
  # ── 1. Lead Reactivation ────────────────────────────────────────────────
  lead_reactivation:
    name: Lead Reactivation
    description: >-
      Dormant CRM data, database value, reactivation ROI, old-lead
      resurrection. Flagship VisQuanta product category.
    cooldown_days: 5
    editorial_weight: 1.2 # flagship — slight priority when multiple unblocked
    cta:
      url: https://www.visquanta.com/lead-reactivation
      label: See how VisQuanta reactivates dormant CRM leads
      product: lead-reactivation
    relevant_sources:
      - podium # Revenue Mining
      - impel # Marketing AI
      - fullpath # dynamic automations
      - matador # SMS broadcast
      - tecobi # Auto Bot
      - dealerai # REACH
      - stella # Catalyst outbound
      - numa
      - mia_labs # Outbound Campaigns, proactive outreach

  # ── 2. Speed to Lead ────────────────────────────────────────────────────
  speed_to_lead:
    name: Speed to Lead
    description: >-
      Inbound response time, SMS-first, 15-minute benchmark, web-lead
      capture, first-response speed. VisQuanta flagship.
    cooldown_days: 5
    editorial_weight: 1.2
    cta:
      url: https://www.visquanta.com/speed-to-lead
      label: See the Speed to Lead demo
      product: speed-to-lead
    relevant_sources:
      - podium # AI BDC
      - fullpath
      - impel
      - numa
      - matador
      - tecobi
      - dealerai
      - stella
      - mia_labs # Voice AI latency, after-hours, inbound SMS, never-miss-a-call

  # ── 3. Service Drive ────────────────────────────────────────────────────
  service_drive:
    name: Service Drive
    description: >-
      Service advisor process, CSI-in-service, service retention, recalls,
      24/7 phone coverage, fixed-ops margin. CSI content frames as
      service-drive when the angle is process/retention.
    cooldown_days: 5
    editorial_weight: 1.1
    cta:
      url: https://www.visquanta.com/service-drive
      label: See Service Drive Pro in action
      product: service-drive-pro
    relevant_sources:
      - impel # Service AI
      - matador # AI Service Agent
      - fullpath
      - stella # Service, Reception
      - numa # Opportunities, LiveCSI
      - dealerai
      - mia_labs # service appointments, 24/7 phone coverage, CSI angle
      - toma # fixed-ops AI agents, 30hrs-of-calls automation, 180-appts/mo case studies

  # ── 4. Web Capture ──────────────────────────────────────────────────────
  web_capture:
    name: Web Capture
    description: >-
      Site conversion, chat vs SMS, form abandonment, night-owl browsing,
      widget install. Covers the "first contact" moment on the dealer website.
    cooldown_days: 5
    editorial_weight: 1.0
    cta:
      url: https://www.visquanta.com/website-widget
      label: Install the SMS First widget on your site
      product: website-widget
    relevant_sources:
      - podium # Webchat
      - impel # Chat AI
      - matador
      - tecobi # website widgets
      - fullpath # web personalization
      - dealerai # chat/email/SMS
      - dealeron # dealer websites + SEO advice
      - gubagoo # chat + messaging + virtual retailing

  # ── 5. Reputation & Reviews ─────────────────────────────────────────────
  reputation:
    name: Reputation & Reviews
    description: >-
      Review response time, Google/Cars.com, CSI-via-reviews, survey gaming,
      review management strategy. CSI content frames as reputation when the
      angle is surveys/public ratings.
    cooldown_days: 5
    editorial_weight: 1.3 # under-defended in competitor land — boost priority
    cta:
      url: https://www.visquanta.com/reputation-management
      label: See Reputation Management in action
      product: reputation-management
    relevant_sources:
      - podium # Reviews — dominant
      - numa # HeatCase, LiveCSI

  # ── 6. Inventory & Pricing ──────────────────────────────────────────────
  inventory:
    name: Inventory & Pricing
    description: >-
      Turn times, pricing pressure, pre-owned trends, acquisition strategy.
      No direct VisQuanta product — thought leadership + supporting content.
    cooldown_days: 7 # thinner topic; longer cooldown avoids forcing weak posts
    editorial_weight: 0.7 # de-prioritize when flagship categories are unblocked
    cta:
      url: https://www.visquanta.com/book-demo
      label: Talk to our team about dealership operations
      product: book-demo
    relevant_sources:
      - impel # Merchandising AI
      - cox_automotive # Manheim index + industry pricing data
      - edmunds_industry

  # ── 7. Industry Trends ──────────────────────────────────────────────────
  industry_trends:
    name: Industry Trends
    description: >-
      NADA, Pied Piper ILE, Cox reports, AI adoption curves, OEM/dealer
      relations, market data. Broader context — no direct product. Use
      sparingly; competes with Automotive News directly.
    cooldown_days: 7
    editorial_weight: 0.6 # lowest — thought leadership only
    cta:
      url: https://www.visquanta.com/book-demo
      label: Talk to our team
      product: book-demo
    relevant_sources:
      - cox_automotive
      - cdk_global
      - nada
      - edmunds_industry
      - dealership_guy
      - automotive_news
      - cbt_news

# ---------------------------------------------------------------------------
# GLOBAL RULES
# ---------------------------------------------------------------------------

rules:
  # Minimum source/quote bar for a topic cluster to proceed to drafting.
  # If a cluster has fewer than min_primary_sources primary citations
  # available in its bundle, the pipeline skips the day rather than draft
  # against thin research.
  research_density:
    min_primary_sources: 3
    min_quotes_per_source: 2

  # Mirror/originate split — 80% of weekly runs come from competitor-signal
  # topic selection, 20% from operator-voice seeds (voice note inbox).
  mirror_originate_split:
    mirror_per_week: 4
    originate_per_week: 1

  # Skip-if-thin: if no category is unblocked AND has viable clusters, the
  # day's scheduled cron no-ops instead of shipping filler content.
  skip_if_thin: true

  # Freshness cutoffs for competitor-signal clustering
  freshness:
    tier1_window_days: 30 # what competitors wrote in last 30d
    tier2_window_days: 30
    tier4_window_days: 14 # media moves faster — shorter lookback

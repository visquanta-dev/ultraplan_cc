# ---------------------------------------------------------------------------
# Categories — content strategy source of truth (2026-04-18 redesign)
#
# Every pipeline run resolves to exactly one category. The category drives:
#   1. Cooldown (no two posts in the same category within cooldown_days)
#   2. Mid-article CTA routing (link to the category's product)
#   3. Which competitor sources are relevant for topic selection / signal
#   4. Editorial weighting when multiple categories are unblocked
#
# Read by:
#   - lib/topics/category-cooldown.ts — cooldown check
#   - lib/topics/competitor-signal.ts — scrape source-tier routing
#   - lib/topics/resolver.ts — final category + cluster pick
#   - lib/stages/auto-linker.ts — mid-article CTA selection (future)
#
# Related files (stay in sync):
#   - config/curated_sources.yaml — legacy bucket-based sources, deprecating
#   - config/topics.yaml — lane word-count + model slugs
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# SOURCES — the 18 blogs + media we watch for topic signal + authority
#
# Tiers:
#   1 = direct competitor (mirror weekly, highest signal weight)
#   2 = adjacent competitor (scan weekly, medium signal weight)
#   3 = authority source (cite on demand, not a competition signal)
#   4 = dealer media (topic-signal leading indicator, 55K+ newsletter reach)
#
# sitemap_path: exact URL path to their post sitemap or RSS feed. Scraper
#   appends to url. Null means "discover via robots.txt at runtime."
# freshness: how often we re-scrape. Daily for media, weekly for competitors.
# ---------------------------------------------------------------------------

sources:
  # ── T1: direct competitors ──────────────────────────────────────────────
  podium:
    name: Podium
    tier: 1
    url: https://www.podium.com
    sitemap_path: /resource-center/sitemap.xml
    freshness: weekly
    notes: Largest direct competitor — AI BDC, reviews, webchat, revenue mining

  fullpath:
    name: Fullpath
    tier: 1
    url: https://www.fullpath.com
    sitemap_path: /blog/sitemap.xml
    freshness: weekly
    notes: Full-stack CDP + agentic CRM + marketing automation

  impel:
    name: Impel AI
    tier: 1
    url: https://impel.ai
    sitemap_path: /blog/sitemap.xml
    freshness: weekly
    notes: Sales AI, Service AI, Chat AI, Marketing AI, Merchandising AI

  numa:
    name: Numa
    tier: 1
    url: https://www.numa.com
    sitemap_path: /blog/sitemap.xml
    freshness: weekly
    notes: Smart Inbox, Opportunities, HeatCase sentiment, LiveCSI — unique angles

  mia_labs:
    name: Mia (Mia Labs)
    tier: 1
    url: https://www.mia.inc
    sitemap_path: /sitemap.xml
    freshness: weekly
    notes: >-
      Direct competitor — conversational AI voice/SMS for dealerships.
      350+ rooftops, $29M total raised (Series A closed 2026). Blog themes:
      voice AI latency, after-hours coverage, outbound campaigns, AI texting,
      CSI. Deepgram partner. ID prefixed with "_labs" to disambiguate from
      the Body Kinetics voice agent also named Mia (unrelated).

  matador:
    name: Matador AI
    tier: 1
    url: https://matador.ai
    sitemap_path: /sitemap-1.xml
    freshness: weekly
    notes: >-
      Promoted to T1 on 2026-04-25. Sitemap path corrected on 2026-04-25
      — old /blog/sitemap.xml 404'd; current path is /sitemap-1.xml (flat,
      has lastmod, ~78 blog URLs mixed with site pages, URL filter handles
      non-blog pages).

  tecobi:
    name: TECOBI
    tier: 1
    url: https://www.tecobi.com
    sitemap_path: /post-sitemap.xml
    freshness: weekly
    notes: >-
      Promoted to T1 on 2026-04-25. Sitemap path corrected on 2026-04-25 —
      old /automotive-advertising-technology-blog/sitemap.xml was a soft-404
      (server returned homepage, XML parse failed silently). Real path is
      /post-sitemap.xml (Rank Math SEO plugin). 114 posts, monthly-ish
      publishing cadence (1 post within 30d of 2026-04-25 smoke test).

  # ── T2: adjacent competitors ────────────────────────────────────────────
  dealerai:
    name: DealerAI
    tier: 2
    url: https://dealerai.com
    sitemap_path: /blogs/sitemap.xml
    freshness: weekly

  stella:
    name: STELLA Automotive
    tier: 2
    url: https://www.stellaautomotive.com
    sitemap_path: /blog/sitemap.xml
    freshness: weekly
    notes: Voice AI vendor for dealerships — moved back to T2 on 2026-04-25 (T3 strict-lastmod was dropping all their entries)

  gubagoo:
    name: Gubagoo
    tier: 2
    url: https://www.gubagoo.com
    sitemap_path: /sitemap.xml
    freshness: weekly
    notes: Chat/messaging + virtual retailing vendor for dealerships — ~40 blog URLs, root sitemap has lastmod

  toma:
    name: Toma

  # drivee: REMOVED 2026-04-21 — no sitemap or RSS feed exists at any path.
  # Scraping would require HTML blog-index parsing, which the signal pipeline
  # doesn't support. Site is tiny; dropping costs no meaningful signal.

  # dealeron MOVED to T3 on 2026-04-25 — dealer-website vendor content reads

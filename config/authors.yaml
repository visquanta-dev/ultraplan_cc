    bio: >-
      William Voyles is Co-Founder and Chief Sales Officer at VisQuanta, where he
      leads go-to-market strategy for the AutoMaster Suite. With years of
      hands-on experience in automotive sales leadership, William has
      firsthand experience running the lead-handling and customer acquisition
      processes he now helps dealerships automate.


      At VisQuanta, William works directly with dealership owners and GMs across
      North America, overseeing deployments of speed-to-lead, lead reactivation,
      reputation management, and voice agent systems. His focus is helping
      dealerships recover revenue from existing customer databases and capture
      inbound leads faster than the competition.


      William writes about dealership sales strategy, lead response
      optimization, CRM workflow design, and the economics of automation
      adoption in automotive retail.

# ============================================================================
# UltraPlan — feed sources
#
# Root blog/news INDEX URLs per publication. The pipeline crawls these index
# pages cheaply (via Firecrawl /v2/map) to discover fresh article URLs, then
# only full-scrapes the 4-6 articles that survive relevance filtering and
# clustering. This is a big cost win over maintaining hardcoded article
# URLs in curated_sources.yaml (which go stale and "burn" per dedup).
#
# Every source listed here MUST have its apex domain in sources.yaml
# trade_press.domains, or the allowlist will refuse the URLs silently.
#
# Tier 1 = established trade press.
# Tier 2 = major vendor / analyst blogs with real industry analysis.
# ============================================================================

version: 1

sources:
  # ---------------------------------------------------------------------------
  # TIER 1 — trade press
  # ---------------------------------------------------------------------------
  cbtnews:
    name: "CBT News"
    tier: 1
    index_urls:
      - https://www.cbtnews.com/category/dealership/
      - https://www.cbtnews.com/category/fixed-ops/
      - https://www.cbtnews.com/category/auto-news/
    max_articles_per_crawl: 10
    freshness_days: 365


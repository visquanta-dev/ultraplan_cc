# ============================================================================
# UltraPlan — editorial calendar
# The steering wheel of the whole system. Every change to cadence, lanes,
# word counts, or model selection lives here. Spec §9.
# ============================================================================

version: 2026-Q2
timezone: America/Chicago

global_constraints:
  - never_mention_specific_clients
  - reputable_sources_only
  - source_first_drafting

lanes:
  daily_seo:
    cadence: "MON,TUE,THU,FRI,SUN 06:00"  # 5 of 7 days — authoritative schedule
    funnel_target: ToFu
    # source_strategy controls the resolver's discovery order.
    #   feed_first    — crawl feed_sources.yaml indices, then curated, then search
    #   curated_first — curated_sources.yaml buckets first, then feed, then search
    #   search_first  — Firecrawl keyword search only (legacy pre-curated path)
    source_strategy: feed_first
    word_count:
      min: 1800
      max: 2200
    sources:
      - trade_press
      - regulatory
      - reddit
    topic_strategy: trend_hijack
    image:
      count: 1
      style: daily_seo
    review: pr_only
    models:
      drafter: claude-opus-4-6
      judge: gpt-5
      image: google/gemini-2.5-flash-image-preview-pro

  weekly_authority:
    cadence: "WED,SAT 06:00"  # 2 of 7 days
    funnel_target: MoFu
    source_strategy: feed_first
    word_count:
      min: 2200
      max: 2800
    sources:
      - linkedin_dealer_principals
      - trade_press
      - reddit
    topic_strategy: opinion_on_signal
    image:
      count: 3
      style: weekly_authority
    review: pr_only
    models:
      drafter: claude-opus-4-6
      judge: gpt-5
      image: google/gemini-2.5-flash-image-preview-pro

  listicle:
    # Listicle lane — "Top N X" / "N Best Y" / "[Number] Reasons Z" format posts.
    # Designed to target high-CTR numbered-query keywords ("best ai tools for
    # car dealerships", "top 10 dealer reputation tactics") which consistently
    # outperform plain titles by 30-50% in SERP click-through. Enumerated H2
    # structure is also the single highest-extraction format for LLM answer
    # surfaces (ChatGPT, Perplexity, Google AI Overviews) in 2026.
    cadence: "on-demand"  # triggered via workflow_dispatch, not a daily slot
    funnel_target: ToFu
    source_strategy: curated_first
    word_count:
      min: 1800
      max: 2400
    sources:
      - trade_press
      - reddit
    topic_strategy: list_roundup
    image:
      count: 1
      style: daily_seo
    review: pr_only
    models:
      drafter: claude-opus-4-6
      judge: gpt-5
      image: google/gemini-2.5-flash-image-preview-pro

  monthly_anonymized_case:
    # Replaces the daily_seo Friday slot on the 1st Friday of each month.
    cadence: "1ST FRI 06:00"
    funnel_target: BoFu
    # Case studies are hand-curated — keep curated_first so the monthly
    # slot doesn't get hijacked by whatever happened to be on the Numa
    # blog index that week.
    source_strategy: curated_first
    word_count:
      min: 2500
      max: 3200
    sources:
      - trade_press
      - regulatory
    topic_strategy: pattern_extraction
    image:
      count: 4
      style: monthly_case_study
    review: pr_plus_anonymization_rescrub
    hard_constraint: no_client_names
    models:
      drafter: claude-opus-4-6
      judge: gpt-5
      image: google/gemini-2.5-flash-image-preview-pro

# Inputs synced from visquanta-dev/site at runtime to drive slot resolution
# (trend ∩ gap targeting, spec §4 "slot resolution = trend ∩ gap").
audit_inputs:
  - sync: visquanta-dev/site/BLOG_FUNNEL_AUDIT.md
    purpose: gap_targeting
  - sync: visquanta-dev/site/ahref_reports/
    purpose: keyword_gaps
  - sync: visquanta-dev/site/SITEMAP.md
    purpose: avoid_duplicates

# =============================================================================
# Curated source list for the blog pipeline resolver
#
# STATUS: NOT YET WIRED UP — tomorrow's Phase 2 work adds resolver support
# for reading from this file. Listed here so we can iterate on the URL set
# in parallel with the code change.
#
# Philosophy:
#   - Every URL is a real, verified article from an authoritative dealership
#     industry publication or a vendor blog that publishes serious analysis.
#   - Only 2025–2026 publication dates (older than 18 months = stale for
#     daily_seo lane). If you add something, check the date.
#   - ~6–8 URLs per topic bucket is the sweet spot. More = slower scrape;
#     fewer = bundle too thin for the drafter to synthesize across sources.
#   - Tier-1 sources lead (autonews, autoremarketing, cbtnews, nada,
#     coxautoinc, wardsauto, cdkglobal, digitaldealer, dealershipguy);
#     Tier-2 sources (vendor blogs with industry-grade analysis) follow.
#
# Rotation discipline:
#   - Every quarter, re-verify URLs still resolve and are still fresh.
#   - Remove any URL older than 18 months unless it's evergreen reference.
#   - When a post on a topic ships, that topic bucket is "spent" for ~30
#     days (dedup handles this — the cluster slug gets blocked).
# =============================================================================

